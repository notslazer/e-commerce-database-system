<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DBMS</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #eef2f5; margin: 0; padding: 0; }
        .navbar { background-color: #1a237e; color: white; padding: 15px 30px; display: flex; flex-wrap: wrap; align-items: center; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .navbar h1 { margin: 0; font-size: 24px; padding-right: 20px; border-right: 2px solid #3949ab; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 5px; }
        .nav-links button { background: none; border: none; color: #c5cae9; font-size: 14px; font-weight: bold; cursor: pointer; padding: 8px 12px; transition: 0.3s; border-radius: 5px; }
        .nav-links button:hover { background-color: #3949ab; color: white; }
        .nav-links button.active { background-color: #ffffff; color: #1a237e; }
        .container { max-width: 1300px; margin: 30px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-section { margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .header-section h2 { color: #333; margin: 0; font-size: 22px; }
        
        /* Form & Buttons */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 12px; color: #666; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .form-grid input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        
        .btn-submit { grid-column: 1 / -1; background-color: #2e7d32; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.3s;}
        .btn-submit:hover { background-color: #1b5e20; }
        .btn-submit.update-mode { background-color: #f57c00; }
        .btn-submit.update-mode:hover { background-color: #e65100; }
        .btn-cancel { background-color: #757575; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; margin-left: 10px;}

        /* Table */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #f1f3f5; color: #333; font-weight: bold; text-transform: uppercase; font-size: 13px; }
        tr:hover { background-color: #f8f9fa; }
        .btn-action { border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; margin-right: 5px; color: white; }
        .btn-edit { background-color: #1976d2; }
        .btn-edit:hover { background-color: #1565c0; }
        .btn-delete { background-color: #d32f2f; }
        .btn-delete:hover { background-color: #b71c1c; }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;
    const API_URL = 'http://localhost:3000/api';

    const tableConfigs = {
        customers: { title: 'Customers', endpoint: 'customers', pk: 'CUSTOMERID', fields: ['CUSTOMERID', 'NAME', 'EMAIL', 'STREET', 'CITY', 'STATE'] },
        customer_phones: { title: 'Phones', endpoint: 'customer_phones', pk: 'PHONE', fields: ['CUSTOMERID', 'PHONE'] },
        categories: { title: 'Categories', endpoint: 'categories', pk: 'CATEGORYID', fields: ['CATEGORYID', 'CNAME'] },
        suppliers: { title: 'Suppliers', endpoint: 'suppliers', pk: 'SUPPLIERID', fields: ['SUPPLIERID', 'SNAME'] },
        products: { title: 'Products', endpoint: 'products', pk: 'PRODUCTID', fields: ['PRODUCTID', 'PNAME', 'PRICE', 'STOCK', 'CATEGORYID'] },
        orders: { title: 'Orders', endpoint: 'orders', pk: 'ORDERID', fields: ['ORDERID', 'ORDERDATE', 'STATUS', 'CUSTOMERID'] },
        order_items: { title: 'Order Items', endpoint: 'order_items', pk: 'SEQUENCEID', fields: ['ORDERID', 'SEQUENCEID', 'PRODUCTID', 'QUANTITY', 'UNITPRICE'] },
        payments: { title: 'Payments', endpoint: 'payments', pk: 'PAYMENTID', fields: ['PAYMENTID', 'AMOUNT', 'ORDERID'] },
        shipments: { title: 'Shipments', endpoint: 'shipments', pk: 'SHIPMENTID', fields: ['SHIPMENTID', 'TRACKINGNUM', 'DELIVERYDATE', 'ORDERID'] },
        reviews: { title: 'Reviews', endpoint: 'reviews', pk: 'REVIEWID', fields: ['REVIEWID', 'RATING', 'COMMENTS', 'REVIEWDATE', 'CUSTOMERID', 'PRODUCTID'] },
        saves: { title: 'Wishlist (Saves)', endpoint: 'saves', pk: 'PRODUCTID', fields: ['CUSTOMERID', 'PRODUCTID'] },
        supplied_by: { title: 'Supplied By', endpoint: 'supplied_by', pk: 'PRODUCTID', fields: ['SUPPLIERID', 'PRODUCTID'] }
    };

    function App() {
        const [activeTab, setActiveTab] = useState('products');

        return (
            <div>
                <div className="navbar">
                    <div className="nav-links">
                        {Object.keys(tableConfigs).map(key => (
                            <button key={key} className={activeTab === key ? 'active' : ''} onClick={() => setActiveTab(key)}>
                                {tableConfigs[key].title}
                            </button>
                        ))}
                    </div>
                </div>
                <div className="container">
                    <GenericTableManager config={tableConfigs[activeTab]} />
                </div>
            </div>
        );
    }

    function GenericTableManager({ config }) {
        const [data, setData] = useState([]);
        const [form, setForm] = useState({});
        const [isEditing, setIsEditing] = useState(false);

        // Reset form when switching tabs
        useEffect(() => {
            resetForm();
            fetchData();
        }, [config]);

        const resetForm = () => {
            const initialForm = {};
            config.fields.forEach(f => initialForm[f] = '');
            setForm(initialForm);
            setIsEditing(false);
        };

        const fetchData = async () => {
            try {
                const res = await fetch(`${API_URL}/${config.endpoint}`);
                const result = await res.json();
                if (Array.isArray(result)) setData(result);
            } catch (err) { console.error("Error fetching data:", err); }
        };

        // Populate form when Edit is clicked
        const handleEditClick = (row) => {
            const editForm = {};
            config.fields.forEach(f => {
                // Formatting dates nicely for the text box if needed
                let val = row[f];
                if (val && f.includes('DATE')) { val = new Date(val).toISOString().split('T')[0]; }
                editForm[f] = val || '';
            });
            setForm(editForm);
            setIsEditing(true);
            window.scrollTo(0, 0); // Scroll to top to see the form
        };

        // Handle Add OR Update
        const handleSubmit = async () => {
            const method = isEditing ? 'PUT' : 'POST';
            const url = isEditing ? `${API_URL}/${config.endpoint}/${form[config.pk]}` : `${API_URL}/${config.endpoint}`;
            
            try {
                const res = await fetch(url, {
                    method: method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(form)
                });
                const result = await res.json();
                
                if (result.success) {
                    resetForm();
                    fetchData();
                } else {
                    alert("Database Error: \n" + result.error);
                }
            } catch (err) { alert("API Connection Error. Ensure Backend is active."); }
        };

        // Handle Delete with Smart Error Messages
        const handleDelete = async (id) => {
            if (window.confirm(`Are you sure you want to delete this record?`)) {
                try {
                    const res = await fetch(`${API_URL}/${config.endpoint}/${id}`, { method: 'DELETE' });
                    const result = await res.json();
                    
                    if (result.success) {
                        fetchData();
                    } else {
                        if(result.error && result.error.includes("ORA-02292")) {
                            alert("❌ CANNOT DELETE:\nThis record is currently being used in another table! \n\nYou must delete the dependent record in the other tab first.");
                        } else {
                            alert("Database Error: \n" + result.error);
                        }
                    }
                } catch(err) {
                    alert("Network Error");
                }
            }
        };

        return (
            <div>
                <div className="header-section">
                    <h2>Manage {config.title} Registry</h2>
                </div>

                <div className="form-grid">
                    {config.fields.map(field => (
                        <div className="input-group" key={field}>
                            <label>{field}</label>
                            <input 
                                placeholder={field.includes('DATE') ? 'YYYY-MM-DD' : `Enter ${field}`} 
                                value={form[field] || ''} 
                                onChange={e => setForm({...form, [field]: e.target.value})}
                                disabled={isEditing && field === config.pk} // Prevent changing Primary Key during an edit
                            />
                        </div>
                    ))}
                    <div style={{gridColumn: "1 / -1"}}>
                        <button className={`btn-submit ${isEditing ? 'update-mode' : ''}`} onClick={handleSubmit}>
                            {isEditing ? '✓ Update Record' : '+ Add New Record'}
                        </button>
                        {isEditing && <button className="btn-cancel" onClick={resetForm}>Cancel</button>}
                    </div>
                </div>

                <div className="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                {config.fields.map(field => <th key={field}>{field}</th>)}
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {data.map((row, index) => (
                                <tr key={index}>
                                    {config.fields.map(field => (
                                        <td key={field}>
                                            {field.includes('DATE') && row[field] 
                                                ? new Date(row[field]).toLocaleDateString() 
                                                : row[field]}
                                        </td>
                                    ))}
                                    <td style={{minWidth: "120px"}}>
                                        <button className="btn-action btn-edit" onClick={() => handleEditClick(row)}>Edit</button>
                                        <button className="btn-action btn-delete" onClick={() => handleDelete(row[config.pk])}>Delete</button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
